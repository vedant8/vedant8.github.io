title: Dr. Vedant Basu
email: vbasu@icecube.wisc.edu
description: "Professional website for Dr. Vedant Basu, neutrino astrophysicist."
baseurl: "" 
url: "https://vedant8.github.io"
github_username: vedant8

# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default" # Try "air" or "contrast" for a different look
locale: "en-US"

# Author Sidebar Settings
author:
  name   : "Vedant Basu"
  avatar : "/assets/images/Pole_Headshot.jpg" 
  bio    : "Astrophysicist"
  location: "Salt Lake City, UT"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/vedant8"

# Build settings
markdown: GFM
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache # Recommended for Minimal Mistakes

# Remove the old 'nav:' block entirely. 
# We are using _data/navigation.yml now, so Jekyll doesn't need this here.

sass:
  style: compressed

# Defaults - IMPORTANT: Removed the /docs/ prefix here
defaults:
  - scope:
      path: ""
    values:
      layout: "single" # Sets a default layout so you don't have to type it every time
      author_profile: true
      css: "/assets/css/custom.css" 

# Exclude these from the build
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/